kind = "mobile"
previewPath = "/"
title = "Gestion Chaussures"
version = "1.0.0"
id = "artifacts/chaussures-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 21233

[services.development]
run = "pnpm --filter @workspace/chaussures-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chaussures-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/chaussures-app", "run", "serve" ]

[services.env]
PORT = "21233"
BASE_PATH = "/"
